<!DOCTYPE html>
<html>
<head>
<title>DK Cafe - Hover & Transition Demo</title>

<style>


body{
    font-family: Arial, Helvetica, sans-serif;
    background:#8aaaaa;
    text-align:center;
}
h1{
    color: #a94155;
    font-family: 'Times New Roman', Times, serif;
}

.btn{
    background:#8b4513cd;
    color:white;
    padding:  20PX 40px ;
    border:none;
    cursor:pointer;
    
}

.btn:hover{
    background:#65a46b;
}


.offer{
    width:200px;

    margin:20px auto;
    padding:20px;
    background:rgb(197, 137, 181);
    border:1px solid #b75252;
 transition: 1s ease;
}

.offer:hover{
    transform: scale(1.1);
}




.menu{
    width:200px;
 
    margin:20px auto;
   
    padding:20px;
    background:#49a0c8cc;
    transition:all 1s linear;
}

.hidden{
    opacity:0;
   
     max-width: 300px;
           
            background-color: red;
            box-shadow: 10px 10px 10px black;
            text-align: center;
            font-size: large;
}
.menu:hover{
        transform: scale(1.1);
    background-color: beige;
}
.menu:hover .hidden{
    
    opacity:0.5;
    background-color: aqua;
   
}


</style>
</head>

<body>

<h1>Welcome to DK Cafe</h1>
<br>
<div class="menu"><h3>Menu</h3>
<p class="hidden">
Bread omelette.
Fresh Juice.
Sandwitch.
Burger.
pizza.
</p>
</div>
<br>

<div class="offer">
<h3>Special offer</h3>
<p >Buy one filter Coffee get one salt biscuit free</p>
</div>



</p>
</div>


<br>
<br>
<button class="btn">Order </button>

</body>
</html>
